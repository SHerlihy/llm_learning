name: Deploy

on:
  push:
    branches:
      - 'main'

env:
  REGION: eu-west-2
  ROLE_ARN: arn:aws:iam::723738378505:role/actions20260308183904013900000001

jobs:
  AWS_Provision:
    runs-on: ubuntu-latest

    name: aws_provision

    permissions:
      id-token: write
      contents: write
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ env.ROLE_ARN }}
          aws-region: ${{ env.REGION }}

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/jod

      # https://github.com/actions/runner-images/issues/10796
      # terraform not included in ubuntu-latest
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "^1.3.7"
          terraform_wrapper: false

      - name: Install dependencies
        run: |
          cd ./application
          npm install
          cd ..

      - name: Build dist
        run: |
          cd ./application
          npm run build
          cd ..

      - name: Deploy changes
        run: |
          WEB_IDENTITY_TOKEN=$(aws sts get-caller-identity)
          echo $WEB_IDENTITY_TOKEN
          cd ./deploy/upload
          terraform init
          terraform apply -auto-approve -var 'actions_role_arn=${{ env.ROLE_ARN }}' -var 'web_identity_token=$WEB_IDENTITY_TOKEN'
          cd ../../

      - name: Push tf state
        run: |
          git config --global user.name 'SHerlihy'
          git config --global user.email 'steven_herlihy@yahoo.com'

      - name: Add state
        run: git add -f deploy/**/terraform.tfstate

      - name: Add var files
        run: git add -f deploy/**/terraform.tfvars

      - name: Commit
        run: git commit -q -n -m"Auto updating tf state" > /dev/null 2>&1 || true

      - name: Push
        run: git push
