name: Deploy

on:
  push:
    branches:
      - 'main'

env:
  REGION: eu-west-2
  ROLE_ARN: arn:aws:iam::723738378505:role/actions20260308170429382700000002

jobs:
  AWS_Provision:
    runs-on: ubuntu-latest

    name: aws_provision

    permissions:
      id-token: write
      contents: write
    
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: $ROLE_ARN
          aws-region: us-east-1

      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/jod

      # https://github.com/actions/runner-images/issues/10796
      # terraform not included in ubuntu-latest
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "^1.3.7"
          terraform_wrapper: false

      - name: Install dependencies
        run: |
          cd ./application
          npm install
          cd ..

      - name: Build dist
        run: |
          cd ./application
          npm run build
          cd ..

      - name: AWS user creds
        run: |
          mkdir ~/.aws
          echo -e "[actions]\n" > ~/.aws/credentials
          echo -e "aws_access_key_id = ${{secrets.AWS_ACCESS_KEY_ID}}\n" >> ~/.aws/credentials
          echo -e "aws_secret_access_key = ${{secrets.AWS_SECRET_ACCESS_KEY}}\n" >> ~/.aws/credentials
          echo -e "[actions]\n" > ~/.aws/config
          echo -e "region = $REGION\n" >> ~/.aws/config

      - name: Deploy changes
        run: |
          cd ./deploy/upload
          terraform init
          terraform apply --auto-approve
          cd ../../

      - name: Push tf state
        run: |
          git config --global user.name 'SHerlihy'
          git config --global user.email 'steven_herlihy@yahoo.com'

      - name: Add state
        run: git add -f deploy/**/terraform.tfstate

      - name: Add var files
        run: git add -f deploy/**/terraform.tfvars

      - name: Commit
        run: git commit -q -n -m"Auto updating tf state" > /dev/null 2>&1 || true

      - name: Push
        run: git push
